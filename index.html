<header>Part 1 总览</header>
<div class="slide-intro">
<p><strong>AI Agent 能力阶梯</strong><span class="hl">是</span>从对话到全场景智能的六层进化体系，它覆盖个人效率到企业系统的完整光谱，<span class="hl">不同于</span><strong>单点 AI 工具</strong>，<span class="hl">它能</span>逐层递进地解决从&quot;会用 AI&quot;到&quot;用好 AI&quot;的认知跃迁问题。</p>
</div>
<div class="cols">
<div>
<p><strong>第一层 · 对话问答</strong> — 你问我答，自然语言交互</p>
<p><strong>第二层 · 自动化工作流</strong> — 固定流程节点化，一键搞定</p>
<p><strong>第三层 · 自主 Agent</strong> — 自主规划，主动收集，动态决策</p>
<p><strong>第四层 · 项目落地</strong> — 理解需求，定制开发技术产品</p>
<p><strong>第五层 · 系统建设</strong> — 完整可用的系统级解决方案</p>
<p><strong>第六层 · 生活助理</strong> — 全场景协同，懂你帮你替你</p>
</div>
<div>
<p><img src="images/agent-layers.svg" alt="" /></p>
<div class="fig-caption">图：AI Agent 六层能力阶梯</div>
</div>
</div>
<blockquote>
<p>核心公式：AI Agent = 大脑(LLM) + 规划 + 记忆 + 工具使用。六层体系，从工具到伙伴。</p>
</blockquote>

<header>1.1 初踏殿堂的体验——对话式AI</header>
<div class="slide-intro">
<p><strong>对话式 AI</strong> <span class="hl">是</span>基于大语言模型的自然语言交互工具，它<span class="hl">主要应用于</span>知识问答、文案创作和代码生成场景，<span class="hl">不同于</span>只能返回链接的<strong>传统搜索引擎</strong>，<span class="hl">它能</span>理解上下文、持续追问并结构化输出，<span class="hl">能解决</span>信息获取效率低和创意启动难的问题。</p>
</div>
<div class="cols">
<div>
<p><strong>核心产品</strong>: DeepSeek · 豆包 · 千问 · ChatGPT</p>
<p><strong>本质</strong>: 你问我答，单轮/多轮自然语言交互</p>
<ul>
<li><strong>适用场景</strong>: 知识问答、文案撰写、代码生成、翻译润色、头脑风暴</li>
<li><strong>核心技巧</strong>:
<ul>
<li><strong>明确角色</strong>: &quot;你是一名资深产品经理...&quot;</li>
<li><strong>提供上下文</strong>: 背景 + 目标 + 约束条件</li>
<li><strong>迭代追问</strong>: 不满意就补充信息继续问</li>
<li><strong>结构化输出</strong>: &quot;请用表格列出...&quot;</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="images/dialogue-products.svg" alt="" /></p>
<div class="fig-caption">图：主流对话式 AI 产品生态</div>
</div>
</div>
<blockquote>
<p>对话式 AI 是起点，不是终点。写好提示词，是普通人驾驭 AI 的第一项核心技能。</p>
</blockquote>
</section>

<header>1.2 让机器替你跑流程——自动化工作流</header>
<div class="slide-intro">
<p><strong>自动化工作流</strong><span class="hl">是</span>将固定业务流程节点化的编排工具，它<span class="hl">主要应用于</span>重复性标准化任务的自动执行，<span class="hl">不同于</span>每次<strong>手动操作的低效方式</strong>，它一次配置即可永久自动运行，<span class="hl">能解决</span>重复劳动大量吞噬工作时间的问题。</p>
</div>
<div class="cols">
<div>
<p><strong>代表平台</strong>: RPA · 快捷指令 · IFTTT</p>
<p><strong>本质</strong>: 将固定流程节点化、自动化，执行规范化标准任务</p>
<p><strong>典型结构</strong>: 触发器 → 输入解析 → 逻辑分支 → 工具调用 → 输出格式化</p>
<p><strong>常见场景</strong>:</p>
<ul>
<li>自动抓取新闻 → 摘要 → 生成日报</li>
<li>上传发票截图 → OCR 识别 → 提取字段 → 录入表格</li>
<li>定时监控竞品 → 对比分析 → 推送告警</li>
</ul>
</div>
<div>
<p><img src="images/workflow-flow.svg" alt="" /></p>
<div class="fig-caption">图：自动化工作流示意</div>
</div>
</div>
<blockquote>
<p>把每次都要做的事变成一键搞定。工作流不酷，但它是效率提升最实在的一步。</p>
</blockquote>
</section>

<header>1.3 给AI装上自己的大脑——自主Agent</header>
<div class="slide-intro">
<p><strong>自主 Agent</strong> <span class="hl">是</span>具备独立规划与执行能力的 AI 智能体，它<span class="hl">主要应用于</span>需要多步骤动态决策的复杂任务，<span class="hl">不同于</span><strong>路径固定的工作流</strong>，<span class="hl">它能</span>根据环境反馈自主调整策略、选择工具并形成闭环，<span class="hl">能解决</span>开放式任务中不可预见的路径变化问题。</p>
</div>
<div class="cols">
<div>
<p><strong>代表平台</strong>: OpenClaw · Hermes Agent · Coze</p>
<p><strong>本质</strong>: Agent 拥有自己的意识——能自主规划、主动交互、主动收集内容</p>
<ul>
<li><strong>核心能力</strong>: 任务拆解 · 工具选择 · 反馈闭环</li>
<li><strong>与工作流的区别</strong>: 工作流路径固定，自主 Agent 路径动态</li>
</ul>
</div>
<div>
<p><img src="images/agent-autonomy.svg" alt="" /></p>
<div class="fig-caption">图：自主 Agent 规划-执行-观察-反思循环</div>
</div>
</div>
<blockquote>
<p>&quot;帮我做一个小红书竞品分析&quot; → Agent 自动搜索素材、整理数据、生成报告。固定流程 vs 动态决策，这是 Agent 进化的关键一跃。</p>
</blockquote>
</section>

<header>1.5 打造完整的数字工厂——系统建设</header>
<div class="slide-intro">
<p><strong>系统建设</strong><span class="hl">是</span>在单项目基础上叠加架构、安全、集成与运维能力的系统级解决方案，它<span class="hl">主要应用于</span>企业级多模块复杂场景，<span class="hl">不同于</span><strong>只能演示的独立 Demo</strong>，它具备权限管控、系统集成和持续运维等生产级能力，<span class="hl">能解决</span>从能用到好用、从单点到体系的规模化问题。</p>
</div>
<div class="cols">
<div>
<p><strong>代表平台</strong>: Trae Solo · WorkBuddy · 悟空</p>
<p><strong>本质</strong>: 在第四层基础上，构建完整可用、可扩展、可维护的系统级解决方案</p>
<p><strong>新增能力</strong>: 多模块设计 · 权限安全 · 系统集成 · 持续运维</p>
<p><strong>典型案例</strong>:</p>
<ul>
<li>企业内部报销审批全流程系统</li>
<li>多数据源汇聚 + 清洗 + 分析平台</li>
<li>智能客服 + 工单管理一体化平台</li>
</ul>
</div>
<div>
<p><img src="images/system-arch.svg" alt="" /></p>
<div class="fig-caption">图：系统分层架构示意</div>
</div>
</div>
<blockquote>
<p>从能用到好用，从单点到体系——系统建设让 Agent 从 Demo 走向生产环境。</p>
</blockquote>
</section>

<header>2.2 给AI写一份灵魂简历——角色设计</header>
<div class="slide-intro">
<p><strong>角色设计</strong><span class="hl">是</span>用自然语言 Prompt 定义 Agent 人设与行为边界的方法，它<span class="hl">主要应用于</span>让 AI 回答精准匹配特定业务场景，<span class="hl">不同于</span><strong>写死规则的硬编码配置方式</strong>，它只需用自然语言描述角色、目标和约束就能灵活调整 Agent 风格，<span class="hl">能解决</span>通用 AI 回答过于泛化、缺乏业务针对性的问题。</p>
</div>
<div class="cols">
<div>
<p><strong>选择模板 → 设定人设 → 配置能力 → 调试优化</strong></p>
<ul>
<li><strong>从模板开始</strong>: Coze 提供丰富的预设模板（客服、助手、翻译等）</li>
<li><strong>人设 Prompt</strong>: 用自然语言定义 Agent 的角色、目标、行为边界</li>
<li><strong>开场白</strong>: 设定 AI 的第一步问候，引导用户交互</li>
<li><strong>调试预览</strong>: 右侧实时对话测试，边调边改</li>
</ul>
</div>
<div>
<p><img src="images/role-design.svg" alt="" /></p>
<div class="fig-caption">图：人设 Prompt 四步设计法</div>
</div>
</div>
<blockquote>
<p>人设越具体，Agent 的行为越精准。好 Prompt 不是写出来的，是调出来的。</p>
</blockquote>
</section>

<header>2.3 给AI装上私域大脑——知识库与RAG</header>
<div class="slide-intro">
<p><strong>知识库</strong><span class="hl">是</span> Agent 的私域信息存储与检索系统，它基于 RAG（检索增强生成）技术让 AI 回答基于企业自有文档，<span class="hl">不同于</span><strong>仅依赖训练数据的通用大模型</strong>，<span class="hl">它能</span>引用具体出处、大幅减少幻觉，<span class="hl">能解决</span>通用 AI 不懂企业专属业务的根本问题。</p>
</div>
<div class="cols">
<div>
<p><strong>上传资料 → 自动分段 → 向量检索 → 精准回答</strong></p>
<ul>
<li><strong>支持格式</strong>: PDF / Word / TXT / 网页链接 / 飞书文档 / 表格</li>
<li><strong>核心价值</strong>: 减少幻觉，回答有据可依</li>
</ul>
<p><strong>场景示例</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>公司员工手册.pdf → 上传知识库

</div>

</div>
</div>
<blockquote>

</blockquote>

<header>2.4 像搭积木一样编排流程——工作流自动化</header>
<div class="slide-intro">
<p><strong>工作流编排</strong><span class="hl">是</span> Coze 的核心自动化引擎，它<span class="hl">主要应用于</span>将复杂业务流程拆解为可拖拽编排的节点链路，<span class="hl">不同于</span>需要<strong>写代码实现业务逻辑的传统方式</strong>，它用可视化节点连接就能完成从输入、处理到输出的全链路自动化，<span class="hl">能解决</span>非技术人员无法独立实现业务流程自动化的问题。</p>
</div>
<div class="cols">
<div>
<p><strong>拖拽节点 → 配置逻辑 → 连接工具 → 一键运行</strong></p>
<table>
<thead>
<tr>
<th>节点</th>
<th>功能</th>
</tr>
</thead>
<tbody>
<tr>
<td>开始 / 结束</td>
<td>接收输入 → 返回结果</td>
</tr>
<tr>
<td>大模型 / 知识库</td>
<td>LLM 处理文本 + 检索私有文档</td>
</tr>
<tr>
<td>代码 / 条件分支</td>
<td>运行脚本 + 逻辑分流</td>
</tr>
<tr>
<td>插件</td>
<td>调用外部工具与 API</td>
</tr>
</tbody>
</table>
<p><strong>案例</strong>: 输入主题 → 搜索热点 → 检索素材 → 生成文案 → 输出草稿</p>
</div>
<div>
<p><img src="images/workflow-flow.svg" alt="" /></p>
<div class="fig-caption">图：Coze 工作流节点编排示意</div>
</div>
</div>
<blockquote>
<p>工作流是 Coze 的核心竞争力——不会写代码没关系，会画流程图就能搭建自动化流程。</p>
</blockquote>
</section>

<header>2.6 让你的Agent无处不在——多渠道发布</header>
<div class="slide-intro">
<p><strong>多渠道发布</strong><span class="hl">是</span> Coze 的一键分发能力，<span class="hl">它能</span>将同一个 Agent 同时部署到飞书、微信、网页和 API 接口，<span class="hl">不同于</span><strong>每个渠道需要单独开发对接的传统方式</strong>，它一次搭建即可全渠道触达用户，<span class="hl">能解决</span> Agent 做好了却找不到用户的最后一公里问题。</p>
</div>
<div class="cols">
<div>
<ul>
<li><strong>飞书</strong>: 直接在飞书群里当机器人用</li>
<li><strong>微信公众号</strong>: 接入客服消息</li>
<li><strong>API</strong>: 通过 HTTP 接口集成到自己的系统</li>
<li><strong>Web</strong>: 嵌入网页，生成分享链接</li>
</ul>
</div>
<div>
<p><img src="images/platform-publish.svg" alt="" /></p>
<div class="fig-caption">图：Coze 多渠道发布矩阵</div>
</div>
</div>
<blockquote>
<p>搭建一次，发布全渠道。你的 Agent 不应该困在开发平台里。</p>
</blockquote>
</section>

<header>2.7 像逛应用商店一样找AI——Agent World</header>
<div class="slide-intro">
<p><strong>Agent World</strong> <span class="hl">是</span> Skill Hub 的进阶形态——AI 智能体的发现与协作平台，它类似于手机应用商店但面向 AI Agent，<span class="hl">不同于</span><strong>一切从零开始创建的传统方式</strong>，它可以一键复制他人优质智能体并二次改造、也可以分享自己的作品，<span class="hl">能解决</span>不知道做什么和不知道怎么做的冷启动问题。</p>
</div>
<div class="cols">
<div>
<p><strong>Agent World（智能体世界）</strong>: Skill Hub 的进阶版，发现他人创作的优质智能体，一键复制使用，支持二次改造</p>
<p><strong>社区生态</strong>: 分享自己的智能体，学习他人的 Prompt 和工作流设计，协作共创复杂项目</p>
</div>
<div>
<p><img src="images/agent-world.svg" alt="" /></p>
<div class="fig-caption">图：Agent World 智能体世界生态</div>
</div>
</div>
<blockquote>
<p>未来 AI 能力的分发方式——不是下载 App，而是发现和订阅智能体。</p>
</blockquote>
</section>

<header>Part 3 总览</header>
<div class="slide-intro">
<p><strong>从需求到交付的实战链路</strong><span class="hl">是</span>连接 AI 能力与业务落地的五步方法论，它覆盖 STAR 梳理、案例拆解、深度挖掘、极速 MVP 和小班课实战，<span class="hl">不同于</span><strong>纯理论的 AI 课程</strong>，它拿真实需求直接开练，<span class="hl">能解决</span>学了 AI 但不会在实际工作中让 Agent 真正跑起来的问题。</p>
</div>
<table>
<thead>
<tr>
<th style="text-align:center">环节</th>
<th>核心方法</th>
<th>关键词</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">1</td>
<td>STAR 需求梳理</td>
<td>Situation → Task → Action → Result</td>
</tr>
<tr>
<td style="text-align:center">2</td>
<td>真实案例拆解</td>
<td>发票报销全流程</td>
</tr>
<tr>
<td style="text-align:center">3</td>
<td>深层次需求挖掘</td>
<td>冰山模型 · 追问五法</td>
</tr>
<tr>
<td style="text-align:center">4</td>
<td>Agent 极速 MVP</td>
<td>传统 2 周 → Agent 1 天</td>
</tr>
<tr>
<td style="text-align:center">5</td>
<td>小班课实战</td>
<td>从观众到主角</td>
</tr>
</tbody>
</table>
<blockquote>
<p>80% 的需求失败不是因为做不了，而是因为需求本身没梳理清楚。</p>
</blockquote>
</section>

<p><strong>STAR 法则</strong><span class="hl">是</span>将模糊需求拆解为情境、任务、行动、结果四个维度的结构化分析框架，它<span class="hl">主要应用于</span>需求不清晰的项目启动阶段，<span class="hl">不同于</span><strong>凭感觉直接动手的做事方式</strong>，它用四个维度把需求变成可量化、可验证、可交付的方案，<span class="hl">能解决</span>需求沟通中理解偏差和范围无限蔓延的核心问题。</p>
</div>
<div class="cols">
<div>
<table>
<thead>
<tr>
<th style="text-align:center">要素</th>
<th>含义</th>
<th>对应</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>S</strong>ituation</td>
<td>情境</td>
<td>业务背景、现状痛点、核心问题</td>
</tr>
<tr>
<td style="text-align:center"><strong>T</strong>ask</td>
<td>任务</td>
<td>需求目标、衡量标准、交付范围</td>
</tr>
<tr>
<td style="text-align:center"><strong>A</strong>ction</td>
<td>行动</td>
<td>解决方案、功能设计、实施路径</td>
</tr>
<tr>
<td style="text-align:center"><strong>R</strong>esult</td>
<td>结果</td>
<td>预期收益、指标达成、迭代方向</td>
</tr>
</tbody>
</table>
</div>
<div>
<p><img src="images/star-framework.svg" alt="" /></p>
<div class="fig-caption">图：STAR 需求梳理框架</div>
</div>
</div>
<blockquote>
<p>STAR 不只是一个框架，它是一种思维方式——先搞清楚问题，再动手解决。</p>
</blockquote>
</section>

<header>3.2 杂货铺变身标准化仓库——异构数据清洗</header>
<div class="slide-intro">
<p><strong>异构数据清洗</strong><span class="hl">是</span>将多源杂乱数据转化为统一标准格式的自动化处理过程，它<span class="hl">主要应用于</span>发票、单据等多渠道异构文件的集中处理场景，<span class="hl">不同于</span><strong>人工逐份下载、识别、录入的传统方式</strong>，<span class="hl">它通过</span> Agent 串联下载、OCR、清洗、填表和异常标记五个环节，<span class="hl">能解决</span>多源异构数据手工整理耗时易错的根本问题。</p>
</div>
<div class="cols">
<div>
<p><strong>Agent 能做什么</strong>:</p>
<ol>
<li>自动下载各渠道文件</li>
<li>OCR 识别提取关键字段</li>
<li>格式转换与数据清洗</li>
<li>填入预设模板</li>
<li>标记异常待人工校验</li>
</ol>
</div>
<div>
<p><img src="images/invoice-flow.svg" alt="" /></p>
<div class="fig-caption">图：发票处理自动化全流程</div>
</div>
</div>
<blockquote>
<p>异构数据源 → 统一标准化模板。这是 Agent 最擅长的脏活累活。</p>
</blockquote>
</section>

<header>3.3 从人工核对到一键出表——审核与报表</header>
<div class="slide-intro">
<p><strong>审核与报表</strong><span class="hl">是</span>将原始数据转化为可决策管理信息的关键闭环，它覆盖规则校验、异常标记、人工复核到最终报表的完整链路，<span class="hl">不同于</span><strong>人工逐条核对的低效方式</strong>，<span class="hl">它通过</span>自动校验加分层的异常处理机制，<span class="hl">能解决</span>报销审核从体力活到确认一下的效率革命问题。</p>
</div>
<div class="cols">
<div>
<p><strong>处理流程</strong>: 原始数据 → 规则校验 → 异常标记 → 人工复核 → 最终报表</p>
<p><strong>报表呈现</strong>:</p>
<ul>
<li>按月份汇总：月度报销趋势图</li>
<li>按类目汇总：各部门/各品类占比</li>
<li>异常统计：问题发票分类 + 处理状态</li>
</ul>
</div>
<div>
<p><img src="images/audit-flow.svg" alt="" /></p>
<div class="fig-caption">图：审核与报表处理流程</div>
</div>
</div>
<blockquote>
<p>从人工核对到一键出表，Agent 把报销审核从&quot;体力活&quot;变成了&quot;确认一下&quot;。</p>
</blockquote>

<header>3.4 冰山下的真相——深层次需求挖掘</header>
<div class="slide-intro">
<p><strong>深层次需求挖掘</strong><span class="hl">是</span>通过连续追问穿透表面诉求的分析方法，它基于冰山模型——水面之上是表面需求、水面之下才是真实需求，<span class="hl">不同于</span><strong>用户说什么就做什么的被动响应模式</strong>，<span class="hl">它通过</span>五个追问层层深入，<span class="hl">能解决</span>做了一个功能却发现根本不是用户真正需要的伪需求问题。</p>
</div>
<div class="cols">
<div>
<table>
<thead>
<tr>
<th>追问</th>
<th>发现的新需求</th>
</tr>
</thead>
<tbody>
<tr>
<td>&quot;这些数据整理好后要导入哪里？&quot;</td>
<td>→ 需要与财务系统对接的接口</td>
</tr>
<tr>
<td>&quot;报账周期是多久一次？&quot;</td>
<td>→ 需要月度自动汇总 + 周期提醒</td>
</tr>
<tr>
<td>&quot;除了个人报销，还有部门预算吗？&quot;</td>
<td>→ 需要部门级预算看板</td>
</tr>
<tr>
<td>&quot;老板要看什么维度的数据？&quot;</td>
<td>→ 需要管理层驾驶舱</td>
</tr>
<tr>
<td>&quot;这些数据和税务申报有关吗？&quot;</td>
<td>→ 需要合规性预检</td>
</tr>
</tbody>
</table>
</div>
<div>
<p><img src="images/iceberg-model.svg" alt="" /></p>
<div class="fig-caption">图：需求冰山模型</div>
</div>
</div>
<blockquote>
<p>表面需求 = 发票整理 + 报表。真实需求 = 财务数据中台 + 预算管理 + 合规风控 + 决策支持。</p>
</blockquote>
</section>

<header>3.5 两周变一天的魔法——Agent极速MVP</header>
<div class="slide-intro">
<p><strong>Agent 极速 MVP</strong> <span class="hl">是</span>利用 AI 自主规划能力快速搭建可运行原型的方法，它<span class="hl">主要应用于</span>需求验证和快速试错阶段，<span class="hl">不同于</span><strong>传统开发的需求文档→排期→开发→测试的长周期流程</strong>，<span class="hl">它能</span>在一天内给出可交互的 Demo 并持续迭代，<span class="hl">能解决</span>传统开发周期太长导致验证成本过高的核心问题。</p>
</div>
<div class="cols">
<div>
<p><strong>传统开发流程</strong>: 需求沟通 → 写文档 → 排期 → 开发（2周） → 测试 → 上线</p>
<p><strong>Agent 辅助流程</strong>: 需求沟通 → Agent 自主规划 → 快速搭建 MVP（1天） → 用户试用 → 迭代</p>
</div>
<div>
<p><img src="images/mvp-comparison.svg" alt="" /></p>
<div class="fig-caption">图：传统开发 vs Agent 辅助对比</div>
</div>
</div>
<blockquote>
<p>传统 2 周 → Agent 1 天，效率提升 10 倍以上。不是替代开发者，而是让验证成本趋近于零。</p>

<header>3.6 从观众到主角的蜕变——小班课预告</header>
<div class="slide-intro">
<p><strong>小班课</strong><span class="hl">是</span>从观众到创建者的实战转型项目，它覆盖需求调研、STAR 梳理、方案设计、Agent 搭建到交付验收的全链路，<span class="hl">不同于</span><strong>纯理论的线上课程</strong>，它用真实项目驱动加精细化指导确保成果交付，<span class="hl">能解决</span>学完还是不会用、做了跑不通的落地最后一公里问题。</p>
</div>
<div class="cols">
<div>
<p><strong>从需求洞察到交付落地的全流程实战</strong></p>
<ul>
<li><strong>实战驱动</strong>: 不教理论，直接拿真实需求开练</li>
<li><strong>全链路覆盖</strong>: 需求调研 → STAR 梳理 → 方案设计 → Agent 搭建 → 交付验收</li>
<li><strong>小班教学</strong>: 每期限额，精细化项目制指导</li>
<li><strong>成果交付</strong>: 课程结束时，你手上有一个真正跑起来的系统</li>
</ul>
<p><strong>适合人群</strong>:</p>
<ul>
<li>想用 AI 提升工作效率的职场人</li>
<li>想转型 AI 产品经理/解决方案的从业者</li>
<li>对 Agent 开发感兴趣的技术爱好者</li>
</ul>
</div>
<div>
<p><img src="images/course-structure.svg" alt="" /></p>
<div class="fig-caption">图：小班课全链路实战</div>
</div>
</div>
<blockquote>
<p>不做 AI 时代的旁观者。一堂课，从观众变主角。</p>
</blockquote>
</section>

  max-height: 100px;
  width: auto;
  margin: 0 auto 20px auto;
}
:root.homePage.part1bg::before {
  background-image: url(&quot;themes/images/gdut/background5.jpg&quot;);
}
:root.homePage.part2bg::before {
  background-image: url(&quot;themes/images/gdut/background6.jpg&quot;);
}
:root.homePage.part3bg::before {
  background-image: url(&quot;themes/images/gdut/background7.jpg&quot;);
}
:root.homePage .footnote {
  position: absolute;
  bottom: 12px;
  right: 26px;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  text-align: right;
}
:root.homePage .footnote a {
  color: #fff;
}
:root .cols {
  display: flex;
  gap: 24px;
  align-items: center;
  margin-bottom: 20px;
}
:root .cols &gt; div:first-child {
  flex: 2;
  min-width: 0;
}
:root .cols &gt; div:last-child {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
:root .cols p {
  margin: 0;
  width: 100%;
}
:root .cols img {
  width: 100%;
  height: auto;
  max-height: 380px;
  display: block;
  margin: 0;
}
:root .cols img.qr-sm {
  width: auto;
  max-width: 200px;
  max-height: 200px;
}

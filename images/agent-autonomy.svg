<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8faff"/><stop offset="100%" stop-color="#e8eff8"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#003f88"/><stop offset="100%" stop-color="#0056b3"/></linearGradient>
  </defs>
  <rect width="400" height="320" rx="12" fill="url(#bg)" stroke="#d0d8e8" stroke-width="1"/>
  <text x="200" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#003f88">自主 Agent 运行循环</text>
  <!-- Center -->
  <circle cx="200" cy="170" r="46" fill="url(#blue)" opacity="0.15"/>
  <text x="200" y="166" text-anchor="middle" font-size="13" font-weight="bold" fill="#003f88">Agent</text>
  <text x="200" y="182" text-anchor="middle" font-size="10" fill="#0056b3">核心引擎</text>
  <!-- Plan - top -->
  <rect x="155" y="52" width="90" height="36" rx="18" fill="url(#blue)"/>
  <text x="200" y="74" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">规划</text>
  <line x1="185" y1="88" x2="175" y2="124" stroke="#003f88" stroke-width="1.5"/>
  <!-- Execute - right -->
  <rect x="310" y="148" width="90" height="36" rx="18" fill="url(#blue)"/>
  <text x="355" y="170" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">执行</text>
  <line x1="310" y1="160" x2="246" y2="155" stroke="#003f88" stroke-width="1.5"/>
  <!-- Observe - bottom -->
  <rect x="155" y="248" width="90" height="36" rx="18" fill="url(#blue)"/>
  <text x="200" y="270" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">观察</text>
  <line x1="215" y1="248" x2="225" y2="206" stroke="#003f88" stroke-width="1.5"/>
  <!-- Reflect - left -->
  <rect x="0" y="148" width="90" height="36" rx="18" fill="url(#blue)"/>
  <text x="45" y="170" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">反思</text>
  <line x1="90" y1="163" x2="154" y2="158" stroke="#003f88" stroke-width="1.5"/>
  <!-- Arrows between outer nodes -->
  <path d="M 110 155 Q 132 70 180 70" fill="none" stroke="#003f88" stroke-width="1.2" stroke-dasharray="4,3"/>
  <path d="M 290 160 Q 340 90 330 130" fill="none" stroke="#003f88" stroke-width="1.2" stroke-dasharray="4,3"/>
  <path d="M 290 175 Q 320 250 245 265" fill="none" stroke="#003f88" stroke-width="1.2" stroke-dasharray="4,3"/>
  <path d="M 110 170 Q 80 230 155 260" fill="none" stroke="#003f88" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Task label -->
  <text x="200" y="305" text-anchor="middle" font-size="11" fill="#666">任务拆解 → 工具选择 → 反馈闭环</text>
</svg>
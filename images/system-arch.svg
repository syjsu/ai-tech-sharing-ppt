<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8faff"/><stop offset="100%" stop-color="#e8eff8"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#003f88"/><stop offset="100%" stop-color="#0056b3"/></linearGradient>
  </defs>
  <rect width="400" height="320" rx="12" fill="url(#bg)" stroke="#d0d8e8" stroke-width="1"/>
  <text x="200" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#003f88">系统分层架构</text>
  <!-- Layers -->
  <rect x="40" y="48" width="320" height="28" rx="6" fill="#e0e0e0"/>
  <text x="200" y="66" text-anchor="middle" font-size="11" fill="#555">基础设施层 · 数据库 / 服务器 / 网络</text>
  <rect x="40" y="82" width="320" height="28" rx="6" fill="#d8e4f4"/>
  <text x="200" y="100" text-anchor="middle" font-size="11" fill="#003f88">数据层 · 多源汇聚 / 清洗 / 存储</text>
  <rect x="40" y="116" width="320" height="28" rx="6" fill="#c5d5f0"/>
  <text x="200" y="134" text-anchor="middle" font-size="11" fill="#003f88">业务层 · 权限管控 / 审批流程 / 规则引擎</text>
  <rect x="40" y="150" width="320" height="28" rx="6" fill="#b0c8eb"/>
  <text x="200" y="168" text-anchor="middle" font-size="11" fill="#003f88">API 层 · 接口网关 / 系统集成</text>
  <rect x="40" y="184" width="320" height="28" rx="6" fill="url(#blue)" opacity="0.85"/>
  <text x="200" y="202" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">展示层 · 驾驶舱 / 看板 / 报表</text>
  <!-- Side labels -->
  <text x="18" y="64" font-size="9" fill="#888">L5</text>
  <text x="18" y="98" font-size="9" fill="#888">L4</text>
  <text x="18" y="132" font-size="9" fill="#888">L3</text>
  <text x="18" y="166" font-size="9" fill="#888">L2</text>
  <text x="18" y="200" font-size="9" fill="#888">L1</text>
  <!-- Pillars -->
  <rect x="80" y="230" width="70" height="26" rx="13" fill="#003f88" opacity="0.1"/>
  <text x="115" y="247" text-anchor="middle" font-size="10" fill="#003f88">安全体系</text>
  <rect x="165" y="230" width="70" height="26" rx="13" fill="#003f88" opacity="0.1"/>
  <text x="200" y="247" text-anchor="middle" font-size="10" fill="#003f88">运维监控</text>
  <rect x="250" y="230" width="70" height="26" rx="13" fill="#003f88" opacity="0.1"/>
  <text x="285" y="247" text-anchor="middle" font-size="10" fill="#003f88">持续集成</text>
  <text x="200" y="280" text-anchor="middle" font-size="9" fill="#666">横向支撑体系</text>
  <text x="200" y="300" text-anchor="middle" font-size="11" fill="#555">多层架构 · 系统级解决方案</text>
</svg>